{% extends 'core/base.html' %}
{% block title %}System Backup | {% endblock title %}
{% block content %}
<div class="container py-4">
  <div class="row">
    <div class="col-md-6 mx-auto">
      <div class="card mt-2">
        <div class="card-header bg-light bg-gradient text-white">
          <h5 class="mb-0 text-center">
            <i class="fas fa-database me-2"></i>Backup Options
          </h5>
        </div>
        <div class="card-body">
          <div class="d-grid gap-2">
            <a
              href="{% url 'admin_manager:system-backup' 'json' %}"
              class="btn btn-outline-primary"
              ><i class="fas fa-file-code me-2"></i>
              JSON Backup
            </a>
            <a
              href="{% url 'admin_manager:system-backup' 'csv' %}"
              class="btn btn-outline-success"
              ><i class="fas fa-file-csv me-2"></i>
              CSV Export
            </a>
            <a
              href="{% url 'admin_manager:system-backup' 'pdf' %}"
              class="btn btn-outline-danger"
              ><i class="fas fa-file-pdf me-2"></i>
              PDF Export
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
