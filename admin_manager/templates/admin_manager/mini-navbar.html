{% if request.user.is_authenticated and request.user.role == ADMIN_ROLE %}
<div class="mini-navbar d-md-none fixed-bottom">
  <div class="container-fluid px-3">
    <div class="row text-center g-0">
      <div class="col-3">
        <a
          href="{% url 'core:home' %}"
          class="mini-nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %} text-decoration-none"
        >
          <i class="fas fa-home fa-lg"></i>
          <span class="ms-1">Home</span>
        </a>
      </div>
      <div class="col-3">
        <a
          href="{% url 'admin_manager:dashboard' %}"
          class="mini-nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %} text-decoration-none"
        >
          <i class="fas fa-tachometer-alt fa-lg"></i>
          <span class="ms-1">Dashboard</span>
        </a>
      </div>
      <div class="col-3">
        <a
          href="{% url 'admin_manager:admin-profile' %}"
          class="mini-nav-item {% if request.resolver_match.url_name == 'admin-profile' %}active{% endif %} text-decoration-none"
        >
          <i class="fas fa-user fa-lg"></i>
          <span class="ms-1">Profile</span>
        </a>
      </div>
      <div class="col-3">
        <a
          href="{% url 'admin_manager:notifications' %}"
          class="mini-nav-item position-relative {% if request.resolver_match.url_name == 'notifications' %}active{% endif %} text-decoration-none {% if unread_count %}text-danger{% endif %}"
        >
          <i class="fas fa-bell fa-lg {% if unread_count %}text-danger{% endif %}"></i>
          {% if unread_count %}
          <span class="notification-badge" id="notification-count">{{ unread_count }}</span>
          {% endif %}
          <span class="ms-1">Alerts</span>
        </a>
      </div>
    </div>
  </div>
</div>
{% endif %}
