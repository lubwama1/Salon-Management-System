{% extends 'core/base.html' %} {% load crispy_forms_tags %}
{% block title %}Resubmit Appointment | {% endblock title %}
{% block content%}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card mt-2 shadow-sm border-0">
        <div class="card-header bg-light text-center rounded-top-4 border-0">
          <h5 class="text-center card-title text-success mb-0">
            <i class="fas fa-calendar-alt me-1"></i>Resubmit Appointment Form
          </h5>
        </div>
        <div class="card-body">
          <form
            method="post"
            action="{% url 'customer:resubmit_appointment' appointment_id=appointment.id %}"
          >
            {% csrf_token %} {{ form|crispy }}
            <div class="text-center mt-2">
              <button type="submit" class="btn btn-primary w-100 btn-sm">
                <i class="fas fa-check-circle me-2"></i>Resubmit Appointment
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
