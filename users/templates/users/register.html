{% extends 'core/base.html' %} {% load crispy_forms_tags %}
{% block title %}Register | {% endblock title %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm rounded-4 border-0">
        <div
          class="card-header rounded-top-4 bg-primary text-white text-center py-3"
        >
          <h4 class="card-title fw-bold mb-0">Join Today</h4>
          <small class="text-light"> Once you join, no regrets 😉 </small>
        </div>
        <div class="card-body">
          <form
            action="{% url 'users:register' %}"
            method="post"
            enctype="multipart/form-data"
          >
            {% csrf_token %}
            <div class="mb-2">{{ form|crispy }}</div>
            <div class="d-grid mb-2">
              <button type="submit" class="btn btn-lg btn-primary">
                <i class="fas fa-user-plus me-2"></i>
                Create Account
              </button>
            </div>
          </form>
          <div class="text-center">
            <small>
              Already have an account?
              <a
                href="{% url 'users:login' %}"
                class="text-decoration-none fw-semibold"
              >
                Login
                <i class="fas fa-sign-in-alt ms-1"></i>
              </a>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock content %}
