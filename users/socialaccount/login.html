{% extends "core/base.html" %} {% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-1 dashboard-card">
        <div class="card-body">
          <div class="card-header mb-2">
            <h3 class="card-title">Sign In with {{ provider.name }}</h3>
          </div>
          <p class="mb-4 text-center">
            You are about to sign in using
            <strong>
              <i class="fab fa-{{ provider.name|lower }} me-2">
                {{ provider.name }}</i
              > </strong
            >.
          </p>

          <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
              <button type="submit" class="btn btn-primary px-4">
                Continue
              </button>
              <a
                href="{% url 'account_login' %}"
                class="btn btn-outline-secondary px-4"
                >Back to Login</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
