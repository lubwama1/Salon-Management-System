{% extends "core/base.html" %} {% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-1 dashboard-card">
        <div class="card-header bg-light">
          <h5 class="card-title mb-0 fw-semibold text-primary">Menu</h5>
        </div>
        <div class="card-body">
          <div class="btn-group" role="group">
            <a href="{% ul 'account_signup' %}" class="btn btn-primary btn-sm"
              >SignUp</a
            >
            <a href="{% url 'account_login' %}" class="btn btn-secondary btn-sm"
              >Sign In</a
            >
          </div>

          <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
              <button type="submit" class="btn btn-primary px-4">
                Continue
              </button>
              <a
                href="{% url 'account_login' %}"
                class="btn btn-outline-secondary px-4"
                >Back to Login</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
